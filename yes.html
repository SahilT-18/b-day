<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! 🎉</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="balloons-bg" id="balloons-bg"></div>

    <div class="container yes-container">
        <h1 class="yes-title">Happy Birthday! 🎂🎉</h1>

        <div class="gif-container">
            <img id="main-gif" src="https://media.tenor.com/pZNpkVGZ3HEAAAAC/happy-birthday-birthday.gif" alt="celebrating">
        </div>

        <p class="yes-message">Wishing you the most amazing day filled with joy, cake, and all your favourite things! 🥳✨</p>
        <p class="yes-sub">You absolutely deserve it 💛</p>
    </div>

    <audio id="bg-music" loop>
        <source src="music/birthday-song.mp3" type="audio/mpeg">
    </audio>

    <button id="music-toggle" onclick="toggleMusic()" title="Toggle music">🔊</button>

    <script src="yes-script.js"></script>
</body>
</html>
